version: '3.8'

services:
  # Production-like service
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - GEMINI_API_KEY=${GEMINI_API_KEY}
    ports:
      - "8080:8080"
    env_file:
      - .env.local
    restart: unless-stopped

  # Development service with Hot Module Replacement (HMR)
  dev:
    build:
      context: .
      target: dev
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - VITE_PORT=3000
    env_file:
      - .env.local
